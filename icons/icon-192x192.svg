<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#065f46;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Outer bg circle -->
  <circle cx="96" cy="96" r="96" fill="url(#g2)"/>
  <!-- Inner glow circle -->
  <circle cx="96" cy="96" r="80" fill="url(#g1)" opacity="0.9"/>
  <!-- Arabic letter Jeem (ج) — Juz Amma -->
  <text x="96" y="138" font-family="serif" font-size="86" font-weight="bold"
        fill="#ffffff" text-anchor="middle" dominant-baseline="auto"
        style="font-family:'Amiri',serif;">ج</text>
  <!-- Small gold crescent at top-right -->
  <text x="144" y="53" font-family="serif" font-size="34"
        fill="#fbbf24" text-anchor="middle">☽</text>
</svg>